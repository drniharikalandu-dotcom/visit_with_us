name: Train and Commit Model

on:
  push:
    branches:
      - main

permissions:
  contents: write   # ✅ allow push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        persist-credentials: true
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install scikit-learn pandas joblib streamlit

    - name: Run training script
      run: python VisitWithUs_Project/train_model.py

    - name: Commit model artifacts
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add model.pkl scaler.pkl
        git commit -m "Add trained model artifacts" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
