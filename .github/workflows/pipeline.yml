name: MLOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install -U huggingface_hub

    - name: Run data preparation
      run: python VisitWithUs_Project/data_preparation.py

    - name: Run model training
      run: python VisitWithUs_Project/train_model.py

    - name: Authenticate with Hugging Face
      run: echo "${{ secrets.HF_TOKEN }}" | hf login --token

    - name: Upload model to Hugging Face
      run: hf upload --repo-id DrNiha555/visit_with_us model.pkl
