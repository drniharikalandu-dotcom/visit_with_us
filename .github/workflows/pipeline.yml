name: Train and Upload Model

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install scikit-learn pandas joblib huggingface_hub streamlit

    - name: Ensure Hugging Face repo exists
      run: |
        python - <<EOF
        import os
        from huggingface_hub import HfApi
        api = HfApi()
        api.create_repo(
            repo_id="DrNiha555/visit_with_us_model",  # ✅ full repo path
            repo_type="model",
            token=os.environ["HF_TOKEN"],
            exist_ok=True
        )
        EOF
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}

    - name: Run training script
      run: python VisitWithUs_Project/train_model.py
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
